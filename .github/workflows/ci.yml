name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bitnet-openai-proxy

jobs:
  # ── Build production image ────────────────────────────────────────────────
  build-production:
    name: Build production image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate production image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # Push to main: latest + main-<sha7>
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            # Version tag vX.Y.Z: semver major, major.minor, major.minor.patch, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Pull request: pr-<number> (no push)
            type=ref,event=pr,prefix=pr-

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build demo image ──────────────────────────────────────────────────────
  build-demo:
    name: Build demo image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate demo image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-demo
          tags: |
            # Push to main: latest-demo + main-<sha7>-demo
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            # Version tag vX.Y.Z: semver tags with -demo suffix
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Pull request: pr-<number>-demo (no push)
            type=ref,event=pr,prefix=pr-

      - name: Build demo image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: demo
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke test ────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [build-production]
    if: github.event_name != 'pull_request'
    steps:
      # Full smoke-test implementation is added in task 5.5
      - name: Placeholder
        run: echo "Smoke-test job — implementation coming in task 5.5"

  # ── Push to GHCR ──────────────────────────────────────────────────────────
  push-ghcr:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: github.event_name != 'pull_request' && needs.smoke-test.result == 'success'
    steps:
      # Full push implementation is added in task 5.6
      - name: Placeholder
        run: echo "Push job — implementation coming in task 5.6"
